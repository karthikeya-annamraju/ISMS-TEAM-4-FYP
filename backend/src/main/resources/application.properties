spring.application.name=subscription

# ==================== H2 Configuration (ACTIVE for quick dev) ====================
spring.datasource.url=jdbc:h2:mem:intellisubdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== MySQL Configuration (DISABLED) ====================
# spring.datasource.url=jdbc:mysql://localhost:3306/intellisubdb?useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=Vaishnavi@5
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Server Configuration ====================
server.port=8080

# ==================== CORS Configuration ====================
cors.allowed.origins=*

# ==================== AI Module Configuration ====================
ai.upload.dir=uploads/csv
python.ml.service.url=http://localhost:5000

# ==================== File Upload Configuration ====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==================== AWS SNS Configuration ====================
aws.sns.region=us-east-1
aws.sns.topic.arn=arn:aws:sns:us-east-1:123456789:intellisub-notifications

# ==================== Application Metadata ====================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration